<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- OTTIMIZZAZIONE SEO -->
    <title>Storie dietro l'ombra | Hub Ufficiale</title>
    <meta name="description" content="Storie realmente accadute, segreti che restano nell'ombra e testimonianze totalmente anonime. Scopri i nostri racconti sui canali ufficiali.">
    <meta name="keywords" content="storie anonime, segreti, racconti veri, storie dietro l'ombra, mistero, testimonianze">
    <meta name="author" content="Storie dietro l'ombra">
    
    <!-- OPEN GRAPH (Per le anteprime sui social e su WhatsApp) -->
    <meta property="og:title" content="Storie dietro l'ombra | Hub Ufficiale">
    <meta property="og:description" content="Storie realmente accadute, segreti che restano nell'ombra e testimonianze totalmente anonime.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://storiedietrolombra.github.io/storiedietrolombra-link-hub/"> <!-- Inserisci qui il tuo link GitHub Pages -->
    <meta property="og:image" content="logo.png"> <!-- Cambia se l'immagine ha un nome diverso -->

    <!-- LIBRERIA ICONE -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0f1016;
            --card-bg: rgba(25, 26, 35, 0.8);
            --text-main: #f4f7f6;
            --text-muted: #a0a0b0;
            --accent: #5e6ad2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 0%, #1e1f35 0%, transparent 70%);
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .container { 
            text-align: center; 
            background: var(--card-bg); 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            backdrop-filter: blur(10px);
            max-width: 400px; 
            width: 100%; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Gestione Logo */
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-container img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
            padding: 3px;
            background-color: #fff; /* Sfondo bianco per far risaltare loghi scuri */
        }

        h1 { 
            font-size: 24px; 
            font-weight: 700;
            margin-bottom: 10px; 
            letter-spacing: 0.5px;
        }

        p.description {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn { 
            display: flex; 
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: rgba(255,255,255,0.05); 
            color: var(--text-main); 
            text-decoration: none; 
            padding: 15px; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 16px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn i {
            font-size: 20px;
        }

        /* Hover states personalizzati per i social */
        .btn.facebook:hover { background-color: #1877F2; border-color: #1877F2; }
        .btn.instagram:hover { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border-color: transparent;
        }
        .btn.tiktok:hover { background-color: #000000; border-color: #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }

    </style>
</head>
<body>
    <div class="container">
        
        <!-- LOGO -->
        <div class="logo-container">
            <!-- Assicurati che l'immagine del logo sia nella stessa cartella e si chiami logo.png -->
            <img src="logo.png" alt="Logo Storie dietro l'ombra">
        </div>

        <h1>Storie dietro l'ombra</h1>
        <p class="description">
            Storie realmente accadute.<br>
            Segreti che restano nell'ombra.<br>
            <strong>Totalmente Anonime.</strong>
        </p>

        <!-- LINK SOCIAL -->
        <div class="links-container">
            <a href="https://www.facebook.com/storiedietrolombra" class="btn facebook" target="_blank" rel="noopener noreferrer">
                <i class="fa-brands fa-facebook"></i> Facebook
            </a>
            
            <!-- Ho corretto l'errore di sintassi sulle virgolette mancanti nel tuo codice originale -->
            <a href="https://www.instagram.com/storiedietrolombra/" class="btn instagram" target="_blank" rel="noopener noreferrer">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            
            <a href="https://www.tiktok.com/@storiedietrolombra" class="btn tiktok" target="_blank" rel="noopener noreferrer">
                <i class="fa-brands fa-tiktok"></i> TikTok
            </a>
        </div>
    </div>
</body>
</html>
